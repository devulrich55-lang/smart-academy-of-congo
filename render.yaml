# Frontend — proxy /api vers l'API (évite CORS sur Render)
services:
  - type: web
    name: smart-academy-of-congo
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: API_PROXY_TARGET
        value: https://smart-academy-of-congo-api-1.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
