# Blueprint Render — Web Service Node (URL officielle : smart-academy-of-congoat)
services:
  - type: web
    name: smart-academy-of-congoat
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PROXY_TARGET
        value: https://smart-academy-of-congo-api-1.onrender.com
      - key: SAC_CSP_ENFORCE
        value: "true"
