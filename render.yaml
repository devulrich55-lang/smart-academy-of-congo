# Blueprint Render — Web Service Node (OBLIGATOIRE pour D1 CSP + proxy /api)
# Ne pas utiliser "Static Site" : server.js ne s'exécute pas en Static.
services:
  - type: web
    name: smart-academy-of-congo
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PROXY_TARGET
        value: https://smart-academy-of-congo-api-1.onrender.com
      - key: SAC_CSP_ENFORCE
        value: "true"
