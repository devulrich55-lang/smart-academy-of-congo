<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Evo Finance — Evo-smartUni</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="icon" href="evo-uni.jpeg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/payments.css" />
  <link rel="stylesheet" href="css/evo-finance.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <meta name="theme-color" content="#0f766e" />
</head>
<body class="ef-page">
  <div id="efRoot" class="ef-root">
    <p class="ef-loading">Chargement d'Evo Finance…</p>
  </div>

  <script src="js/sac-universities.js"></script>
  <script src="js/sac-session.js"></script>
  <script src="js/sac-api.js"></script>
  <script>
    if (typeof SAC_API !== "undefined" && SAC_API.wakeServer) {
      SAC_API.wakeServer({ attempts: 4, timeoutMs: 45000, delayMs: 3000 });
    }
  </script>
  <script src="js/sac-payment-aggregator.js"></script>
  <script src="js/sac-evo-finance.js?v=20260710g"></script>
  <script>
    (async function () {
      const root = document.getElementById("efRoot");
      function setStatus(msg) {
        if (root) root.innerHTML = '<p class="ef-loading">' + msg + "</p>";
      }

      try {
        setStatus("Vérification de la session…");
        let session = null;
        if (typeof SAC_SESSION !== "undefined") {
          session = SAC_SESSION.getSession?.() || null;
          if (session?.identifiant && SAC_SESSION.resolveNavigationSession) {
            try {
              session = await Promise.race([
                SAC_SESSION.resolveNavigationSession(),
                new Promise(function (resolve) {
                  setTimeout(function () {
                    resolve(SAC_SESSION.getSession?.() || session);
                  }, 12000);
                }),
              ]);
            } catch {
              session = SAC_SESSION.getSession?.() || session;
            }
          }
        }

        if (!session?.identifiant) {
          window.location.replace("evofinance/?next=" + encodeURIComponent("evo-finance.html"));
          return;
        }
        if (session.role !== "superadmin") {
          alert("Evo Finance est réservé au Super Admin. Accédez-y via le portail /evofinance/.");
          window.location.replace("evofinance/");
          return;
        }

        setStatus("Ouverture d'Evo Finance…");
        if (typeof SAC_EVO_FINANCE === "undefined" || !SAC_EVO_FINANCE.mount) {
          setStatus("Erreur — module Evo Finance indisponible.");
          return;
        }
        await SAC_EVO_FINANCE.mount("efRoot", session);
      } catch (err) {
        setStatus("Erreur : " + (err && err.message ? err.message : "chargement impossible"));
      }
    })();
  </script>
  <script src="js/sac-mobile.js" defer></script>
</body>
</html>
