<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fiche de cote — Evo-smartUni</title>
  <link rel="icon" href="evo-uni.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="css/grade-sheet.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="grade-sheet-page">
  <div id="root"><p style="text-align:center;padding:2rem;">Vérification de l'accès…</p></div>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-universities.js"></script>
  <script src="js/sac-identity.js"></script>
  <script src="js/sac-session.js"></script>
  <script src="js/sac-api.js"></script>
  <script src="js/sac-university-logo.js"></script>
  <script src="js/sac-grades.js"></script>
  <script src="js/sac-grade-sheet.js"></script>
  <script>
    (async function () {
      const id = new URLSearchParams(window.location.search).get("id");
      const root = document.getElementById("root");
      if (!id) {
        root.innerHTML = "<p style=\"text-align:center;padding:2rem;\">Fiche introuvable. Ouvrez-la depuis votre espace sécurisé.</p>";
        return;
      }
      await SAC_GRADE_SHEET.mountProtectedFichePage(root, id);
    })();
  </script>
  <script src="js/sac-mobile.js" defer></script>
</body>
</html>
