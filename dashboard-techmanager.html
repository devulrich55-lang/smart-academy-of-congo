<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Manager — EvoSmartUni</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-portal.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/devcenter.css?v=20260713" />
  <meta name="theme-color" content="#0f766e" />
</head>
<body class="devcenter-dashboard tm-dashboard">
  <header class="header ws-header dc-header tm-header">
    <div class="header__top">
      <a href="techmanager/" class="logo"><span class="logo__text">Tech Manager <small>Responsable technique</small></span></a>
      <div class="dc-header__actions">
        <span class="badge-role tm-badge">🎯 TECH MANAGER</span>
        <span id="tmUserName"></span>
        <button type="button" class="btn btn--ghost btn--xs" id="tmRefreshBtn">Actualiser</button>
        <button type="button" class="btn btn--ghost" id="btnLogout">Déconnexion</button>
      </div>
    </div>
    <nav class="nav-tabs dc-nav" aria-label="Tech Manager">
      <button type="button" class="nav-tab tm-tab active" data-view="board">📋 Tickets</button>
      <button type="button" class="nav-tab tm-tab" data-view="review">✅ À valider <span class="dc-count" id="tmReviewCount">0</span></button>
      <button type="button" class="nav-tab tm-tab" data-view="team">👥 Équipe</button>
      <button type="button" class="nav-tab tm-tab" data-view="stats">📊 Statistiques</button>
      <button type="button" class="nav-tab tm-tab" data-view="shield">🛡️ Bouclier</button>
    </nav>
  </header>
  <div class="dc-toast" id="tmToast"></div>
  <main class="layout dc-layout">
    <section class="page-section active" id="tm-board">
      <h1 class="page-title">Gestion des tickets</h1>
      <p class="page-desc">Attribuez, priorisez et validez avant production.</p>
      <div class="dc-grid">
        <div class="dc-panel" id="tmTicketsList"></div>
        <div class="dc-panel dc-panel--detail" id="tmTicketDetail"><p class="dc-empty">Sélectionnez un ticket.</p></div>
      </div>
    </section>
    <section class="page-section" id="tm-team"><div class="dc-panel tm-section-panel" id="tmTeamPanel"></div></section>
    <section class="page-section" id="tm-stats"><div class="dc-panel tm-section-panel" id="tmStatsPanel"></div></section>
    <section class="page-section" id="tm-shield"><div class="dc-panel tm-section-panel" id="tmShieldPanel"></div></section>
  </main>
  <script src="js/sac-session.js?v=20260713"></script>
  <script src="js/sac-api.js?v=20260713"></script>
  <script src="js/sac-techmanager.js?v=20260713"></script>
  <script>
    (function () {
      "use strict";

      var SCRIPT_ERR = false;

      function tmToast(msg) {
        var el = document.getElementById("tmToast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("dc-toast--show");
        setTimeout(function () {
          el.classList.remove("dc-toast--show");
        }, 5000);
      }

      function tmShowView(view) {
        var map = {
          board: "tm-board",
          review: "tm-board",
          team: "tm-team",
          stats: "tm-stats",
          shield: "tm-shield",
        };
        var tabs = document.querySelectorAll(".tm-tab");
        for (var i = 0; i < tabs.length; i++) {
          tabs[i].classList.toggle("active", tabs[i].getAttribute("data-view") === view);
        }
        var sections = document.querySelectorAll(".page-section");
        for (var j = 0; j < sections.length; j++) {
          sections[j].classList.remove("active");
        }
        var target = document.getElementById(map[view] || "tm-board");
        if (target) target.classList.add("active");
      }

      function tmFindTab(el, nav) {
        while (el && el !== nav) {
          if (el.classList && el.classList.contains("tm-tab")) return el;
          el = el.parentElement;
        }
        return null;
      }

      function tmBindFallback() {
        var nav = document.querySelector(".dc-nav");
        if (nav && !nav.dataset.tmFallback) {
          nav.dataset.tmFallback = "1";
          nav.addEventListener("click", function (e) {
            var tab = tmFindTab(e.target, nav);
            if (!tab) return;
            e.preventDefault();
            var view = tab.getAttribute("data-view") || "board";
            if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.handleTab) {
              SAC_TECHMANAGER.handleTab(view);
            } else {
              tmShowView(view);
              if (SCRIPT_ERR) {
                tmToast("Module données indisponible — Ctrl+F5 ou redeploy frontend.");
              }
            }
          });
        }
        var refreshBtn = document.getElementById("tmRefreshBtn");
        if (refreshBtn && !refreshBtn.dataset.tmBound) {
          refreshBtn.dataset.tmBound = "1";
          refreshBtn.addEventListener("click", function () {
            if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.refresh) {
              SAC_TECHMANAGER.refresh().catch(function (err) {
                tmToast((err && err.message) || "Erreur actualisation.");
              });
            } else {
              window.location.reload();
            }
          });
        }
        var logoutBtn = document.getElementById("btnLogout");
        if (logoutBtn && !logoutBtn.dataset.tmBound) {
          logoutBtn.dataset.tmBound = "1";
          logoutBtn.addEventListener("click", function () {
            if (typeof SAC_SESSION !== "undefined" && SAC_SESSION.logout) {
              var url =
                typeof SAC_PORTAL !== "undefined"
                  ? SAC_PORTAL.siteUrl("techmanager/")
                  : "techmanager/";
              SAC_SESSION.logout(url);
            } else {
              window.location.href = "techmanager/";
            }
          });
        }
      }

      function markScriptError(label) {
        SCRIPT_ERR = true;
        tmToast("Erreur chargement " + label + " — Ctrl+F5");
      }

      document.addEventListener("DOMContentLoaded", function () {
        tmBindFallback();
        if (typeof SAC_SESSION === "undefined") markScriptError("session");
        if (typeof SAC_API === "undefined") markScriptError("API");
        if (typeof SAC_TECHMANAGER === "undefined") markScriptError("Tech Manager");
        if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.init) {
          SAC_TECHMANAGER.init();
        }
      });
    })();
  </script>
</body>
</html>
