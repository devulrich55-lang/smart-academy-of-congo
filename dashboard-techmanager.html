<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Manager — EvoSmartUni</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-portal.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/devcenter.css?v=20260714" />
  <meta name="theme-color" content="#0f766e" />
</head>
<body class="devcenter-dashboard tm-dashboard">
  <header class="header ws-header dc-header tm-header">
    <div class="header__top">
      <a href="techmanager/" class="logo"><span class="logo__text">Tech Manager <small>Responsable technique</small></span></a>
      <div class="dc-header__actions">
        <span class="badge-role tm-badge">🎯 TECH MANAGER</span>
        <span id="tmUserName"></span>
        <button type="button" class="btn btn--ghost btn--xs" id="tmRefreshBtn">Actualiser</button>
        <button type="button" class="btn btn--ghost" id="btnLogout">Déconnexion</button>
      </div>
    </div>
    <nav class="nav-tabs dc-nav" aria-label="Tech Manager">
      <button type="button" class="nav-tab tm-tab active" data-view="board">📋 Tickets</button>
      <button type="button" class="nav-tab tm-tab" data-view="review">✅ À valider <span class="dc-count" id="tmReviewCount">0</span></button>
      <button type="button" class="nav-tab tm-tab" data-view="team">👥 Équipe</button>
      <button type="button" class="nav-tab tm-tab" data-view="stats">📊 Statistiques</button>
      <button type="button" class="nav-tab tm-tab" data-view="shield">🛡️ Bouclier</button>
    </nav>
  </header>
  <div class="dc-toast" id="tmToast"></div>
  <main class="layout dc-layout">
    <section class="page-section active" id="tm-board">
      <h1 class="page-title">Gestion des tickets</h1>
      <p class="page-desc">Attribuez, priorisez et validez avant production.</p>
      <div class="dc-grid">
        <div class="dc-panel" id="tmTicketsList"></div>
        <div class="dc-panel dc-panel--detail" id="tmTicketDetail"><p class="dc-empty">Sélectionnez un ticket.</p></div>
      </div>
    </section>
    <section class="page-section" id="tm-team"><div class="dc-panel tm-section-panel" id="tmTeamPanel"></div></section>
    <section class="page-section" id="tm-stats"><div class="dc-panel tm-section-panel" id="tmStatsPanel"></div></section>
    <section class="page-section" id="tm-shield"><div class="dc-panel tm-section-panel" id="tmShieldPanel"></div></section>
  </main>
  <script>
    (function () {
      "use strict";

      var TM_ASSET = "20260714";
      var TM_SCRIPTS = [
        "js/sac-session.js?v=" + TM_ASSET,
        "js/sac-api.js?v=" + TM_ASSET,
        "js/sac-techmanager.js?v=" + TM_ASSET,
      ];
      var loadErrors = [];

      function tmToast(msg) {
        var el = document.getElementById("tmToast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("dc-toast--show");
        setTimeout(function () {
          el.classList.remove("dc-toast--show");
        }, 6000);
      }

      function tmShowView(view) {
        var map = {
          board: "tm-board",
          review: "tm-board",
          team: "tm-team",
          stats: "tm-stats",
          shield: "tm-shield",
        };
        var tabs = document.querySelectorAll(".tm-tab");
        for (var i = 0; i < tabs.length; i++) {
          tabs[i].classList.toggle("active", tabs[i].getAttribute("data-view") === view);
        }
        var sections = document.querySelectorAll(".page-section");
        for (var j = 0; j < sections.length; j++) {
          sections[j].classList.remove("active");
        }
        var target = document.getElementById(map[view] || "tm-board");
        if (target) target.classList.add("active");
      }

      function tmFindTab(el, nav) {
        while (el && el !== nav) {
          if (el.classList && el.classList.contains("tm-tab")) return el;
          el = el.parentElement;
        }
        return null;
      }

      function loadScript(url, tryPlain) {
        return new Promise(function (resolve) {
          var src = tryPlain ? url.split("?")[0] : url;
          var s = document.createElement("script");
          s.src = src;
          s.async = false;
          s.onload = function () {
            resolve(true);
          };
          s.onerror = function () {
            if (!tryPlain) {
              loadScript(url, true).then(resolve);
              return;
            }
            loadErrors.push(src);
            resolve(false);
          };
          document.body.appendChild(s);
        });
      }

      function loadScriptsChain(index) {
        if (index >= TM_SCRIPTS.length) return Promise.resolve();
        return loadScript(TM_SCRIPTS[index], false).then(function () {
          return loadScriptsChain(index + 1);
        });
      }

      function tmHandleTab(view) {
        if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.handleTab) {
          return SAC_TECHMANAGER.handleTab(view);
        }
        tmShowView(view);
        if (typeof SAC_API === "undefined") {
          tmToast("Scripts incomplets — Ctrl+Shift+R puis redeploy frontend.");
          return Promise.resolve();
        }
        var host;
        if (view === "board" || view === "review") {
          host = document.getElementById("tmTicketsList");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          var filter = view === "review" ? "review" : "all";
          return SAC_API.listTechManagerTickets(filter, 150)
            .then(function (data) {
              var tickets = (data && data.tickets) || [];
              if (!host) return;
              host.innerHTML = tickets.length
                ? tickets
                    .map(function (t) {
                      return (
                        "<article class='dc-ticket'><code>" +
                        (t.ticketNumber || "") +
                        "</code> <strong>" +
                        (t.title || "") +
                        "</strong></article>"
                      );
                    })
                    .join("")
                : "<p class='dc-empty'>Aucun ticket.</p>";
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "team" && SAC_API.listTechManagerTeam) {
          host = document.getElementById("tmTeamPanel");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          return SAC_API.listTechManagerTeam()
            .then(function (data) {
              var devs = (data && data.developers) || [];
              if (!host) return;
              host.innerHTML =
                "<h1 class='page-title'>Performances équipe</h1>" +
                (devs.length
                  ? devs
                      .map(function (d) {
                        return "<article class='dc-project-card'><h3>" + (d.displayName || "") + "</h3></article>";
                      })
                      .join("")
                  : "<p class='dc-empty'>Aucun développeur.</p>");
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "stats" && SAC_API.getTechManagerStats) {
          host = document.getElementById("tmStatsPanel");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          return SAC_API.getTechManagerStats()
            .then(function (data) {
              var g = (data && data.global) || {};
              if (!host) return;
              host.innerHTML =
                "<h1 class='page-title'>Statistiques</h1><p>Total : " + (g.total || 0) + "</p>";
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "shield") {
          host = document.getElementById("tmShieldPanel");
          if (host) {
            host.innerHTML =
              "<h1 class='page-title'>Bouclier</h1><p class='dc-empty'>Redeployez l'API si le bouclier est vide.</p>";
          }
        }
        return Promise.resolve();
      }

      function tmBindUi() {
        var nav = document.querySelector(".dc-nav");
        if (nav && !nav.dataset.tmBound) {
          nav.dataset.tmBound = "1";
          nav.addEventListener("click", function (e) {
            var tab = tmFindTab(e.target, nav);
            if (!tab) return;
            e.preventDefault();
            tmHandleTab(tab.getAttribute("data-view") || "board");
          });
        }
        var refreshBtn = document.getElementById("tmRefreshBtn");
        if (refreshBtn && !refreshBtn.dataset.tmBound) {
          refreshBtn.dataset.tmBound = "1";
          refreshBtn.addEventListener("click", function () {
            if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.refresh) {
              SAC_TECHMANAGER.refresh().catch(function (err) {
                tmToast((err && err.message) || "Erreur actualisation.");
              });
            } else {
              window.location.reload();
            }
          });
        }
        var logoutBtn = document.getElementById("btnLogout");
        if (logoutBtn && !logoutBtn.dataset.tmBound) {
          logoutBtn.dataset.tmBound = "1";
          logoutBtn.addEventListener("click", function () {
            if (typeof SAC_SESSION !== "undefined" && SAC_SESSION.logout) {
              var url =
                typeof SAC_PORTAL !== "undefined"
                  ? SAC_PORTAL.siteUrl("techmanager/")
                  : "techmanager/";
              SAC_SESSION.logout(url);
            } else {
              window.location.href = "techmanager/";
            }
          });
        }
      }

      function tmBoot() {
        tmBindUi();
        if (loadErrors.length) {
          tmToast("Fichiers manquants : " + loadErrors.join(", "));
        }
        if (typeof SAC_TECHMANAGER !== "undefined" && SAC_TECHMANAGER.init) {
          SAC_TECHMANAGER.init();
        } else if (typeof SAC_API !== "undefined") {
          tmToast("Mode secours actif — rechargez après deploy.");
          tmHandleTab("board");
        } else {
          tmToast("Chargement incomplet — Ctrl+Shift+R");
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadScriptsChain(0).then(tmBoot);
      });
    })();
  </script>
</body>
</html>
