<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Manager — EvoSmartUni</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-portal.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/devcenter.css?v=20260717" />
  <meta name="theme-color" content="#0f766e" />
</head>
<body class="devcenter-dashboard tm-dashboard">
  <header class="header ws-header dc-header tm-header">
    <div class="header__top">
      <a href="techmanager/" class="logo"><span class="logo__text">Tech Manager <small>Responsable technique</small></span></a>
      <div class="dc-header__actions">
        <span class="badge-role tm-badge">🎯 TECH MANAGER</span>
        <span id="tmUserName"></span>
        <button type="button" class="btn btn--ghost btn--xs" id="tmRefreshBtn">Actualiser</button>
        <button type="button" class="btn btn--ghost" id="btnLogout">Déconnexion</button>
      </div>
    </div>
    <nav class="nav-tabs dc-nav" aria-label="Tech Manager">
      <button type="button" class="nav-tab tm-tab active" data-view="board">📋 Tickets</button>
      <button type="button" class="nav-tab tm-tab" data-view="review">✅ À valider <span class="dc-count" id="tmReviewCount">0</span></button>
      <button type="button" class="nav-tab tm-tab" data-view="team">👥 Équipe</button>
      <button type="button" class="nav-tab tm-tab" data-view="stats">📊 Statistiques</button>
      <button type="button" class="nav-tab tm-tab" data-view="shield">🛡️ Bouclier</button>
    </nav>
  </header>
  <div class="dc-toast" id="tmToast"></div>
  <main class="layout dc-layout">
    <section class="page-section active" id="tm-board">
      <h1 class="page-title">Gestion des tickets</h1>
      <p class="page-desc">Attribuez, priorisez et validez avant production.</p>
      <div class="dc-grid">
        <div class="dc-panel" id="tmTicketsList"></div>
        <div class="dc-panel dc-panel--detail" id="tmTicketDetail"><p class="dc-empty">Sélectionnez un ticket.</p></div>
      </div>
    </section>
    <section class="page-section" id="tm-team"><div class="dc-panel tm-section-panel" id="tmTeamPanel"></div></section>
    <section class="page-section" id="tm-stats"><div class="dc-panel tm-section-panel" id="tmStatsPanel"></div></section>
    <section class="page-section" id="tm-shield"><div class="dc-panel tm-section-panel" id="tmShieldPanel"></div></section>
  </main>
  <script src="js/sac-session.js?v=20260717"></script>
  <script src="js/sac-api.js?v=20260717"></script>
  <script src="js/sac-techmanager.js?v=20260717"></script>
  <script>
    (function () {
      "use strict";

      function tmModule() {
        if (window.SAC_TECHMANAGER) return window.SAC_TECHMANAGER;
        if (typeof SAC_TECHMANAGER !== "undefined") return SAC_TECHMANAGER;
        return null;
      }

      function tmApi() {
        if (window.SAC_API) return window.SAC_API;
        if (typeof SAC_API !== "undefined") return SAC_API;
        return null;
      }

      function tmToast(msg) {
        var el = document.getElementById("tmToast");
        if (!el) return;
        el.textContent = msg;
        el.classList.add("dc-toast--show");
        setTimeout(function () {
          el.classList.remove("dc-toast--show");
        }, 6000);
      }

      function tmShowView(view) {
        var map = {
          board: "tm-board",
          review: "tm-board",
          team: "tm-team",
          stats: "tm-stats",
          shield: "tm-shield",
        };
        var tabs = document.querySelectorAll(".tm-tab");
        for (var i = 0; i < tabs.length; i++) {
          tabs[i].classList.toggle("active", tabs[i].getAttribute("data-view") === view);
        }
        var sections = document.querySelectorAll(".page-section");
        for (var j = 0; j < sections.length; j++) {
          sections[j].classList.remove("active");
        }
        var target = document.getElementById(map[view] || "tm-board");
        if (target) target.classList.add("active");
      }

      function tmFindTab(el, nav) {
        while (el && el !== nav) {
          if (el.classList && el.classList.contains("tm-tab")) return el;
          el = el.parentElement;
        }
        return null;
      }

      function tmEsc(s) {
        var el = document.createElement("div");
        el.textContent = String(s != null ? s : "");
        return el.innerHTML;
      }

      function tmRenderShieldFallback() {
        var host = document.getElementById("tmShieldPanel");
        var api = tmApi();
        if (!host || !api || typeof api.getTechManagerShieldOverview !== "function") {
          if (host) {
            host.innerHTML =
              "<h1 class='page-title'>Bouclier anti-attaque</h1><p class='dc-empty'>Client API obsolète ou absent — redeployez le frontend puis Ctrl+Shift+R.<br><small>Si le message persiste, redeployez aussi l'API backend.</small></p>";
          }
          return Promise.resolve();
        }
        host.innerHTML = "<p class='dc-empty'>Chargement du bouclier…</p>";
        return Promise.all([
          api.getTechManagerShieldOverview(),
          api.getTechManagerShieldTrends(24),
          api.listTechManagerShieldEvents(30),
          api.listTechManagerShieldBlocked(),
          api.getTechManagerShieldAlertsStatus(),
        ])
          .then(function (results) {
            var overview = results[0] || {};
            var trends = results[1] || {};
            var events = (results[2] && results[2].events) || [];
            var blocked = (results[3] && results[3].blocked) || [];
            var alerts = results[4] || {};
            var th = overview.thresholds || {};
            host.innerHTML =
              "<h1 class='page-title'>Bouclier anti-attaque</h1>" +
              "<p class='page-desc'>Mode secours — données live via API.</p>" +
              "<p class='tm-shield-meta'>Mis à jour : " +
              tmEsc(overview.updatedAt || "—") +
              " · Seuils : " +
              tmEsc(th.throttle) +
              " / " +
              tmEsc(th.block) +
              " / " +
              tmEsc(th.honeypot) +
              "</p>" +
              '<span class="tm-shield-status ' +
              (overview.enabled ? "tm-shield-status--on" : "tm-shield-status--off") +
              '">🛡 ' +
              (overview.enabled ? "Actif" : "Désactivé") +
              "</span>" +
              '<div class="dc-kpi-grid" style="margin-top:1rem">' +
              '<div class="dc-kpi"><strong>' +
              tmEsc(overview.events24h) +
              "</strong><span>Événements 24h</span></div>" +
              '<div class="dc-kpi"><strong>' +
              tmEsc(overview.blockedActive) +
              "</strong><span>IP bloquées</span></div>" +
              '<div class="dc-kpi"><strong>' +
              tmEsc(overview.honeypot24h) +
              "</strong><span>Honeypot 24h</span></div>" +
              '<div class="dc-kpi"><strong>' +
              tmEsc(overview.avgScore24h) +
              "</strong><span>Score moyen</span></div></div>" +
              "<p class='tm-shield-meta'>Alertes : " +
              (alerts.enabled ? "actives" : "off") +
              " · envoyées 24h : " +
              tmEsc(alerts.sent24h) +
              "</p>" +
              (events.length
                ? '<div class="tm-shield-section"><h2>Événements récents</h2><table class="tm-shield-table"><thead><tr><th>Heure</th><th>IP</th><th>Score</th><th>Action</th><th>Requête</th></tr></thead><tbody>' +
                  events
                    .map(function (ev) {
                      return (
                        "<tr><td>" +
                        tmEsc((ev.createdAt || "").slice(11, 19)) +
                        "</td><td>" +
                        tmEsc(ev.ipMasked) +
                        "</td><td>" +
                        tmEsc(ev.score) +
                        "</td><td>" +
                        tmEsc(ev.action) +
                        "</td><td><span class='tm-shield-path'>" +
                        tmEsc(ev.method) +
                        " " +
                        tmEsc(ev.path) +
                        "</span></td></tr>"
                      );
                    })
                    .join("") +
                  "</tbody></table></div>"
                : '<p class="dc-empty">Aucun événement récent.</p>') +
              (blocked.length
                ? '<div class="tm-shield-section"><h2>IP bloquées</h2><table class="tm-shield-table"><thead><tr><th>IP</th><th>Score</th><th>Raison</th><th>Jusqu\'à</th></tr></thead><tbody>' +
                  blocked
                    .map(function (b) {
                      return (
                        "<tr><td>" +
                        tmEsc(b.ipMasked) +
                        "</td><td>" +
                        tmEsc(b.score) +
                        "</td><td>" +
                        tmEsc(b.reason) +
                        "</td><td>" +
                        tmEsc((b.blockedUntil || "").slice(0, 19)) +
                        "</td></tr>"
                      );
                    })
                    .join("") +
                  "</tbody></table></div>"
                : "") +
              ((trends.topPaths || []).length
                ? '<div class="tm-shield-section"><h2>Top chemins</h2><ul>' +
                  trends.topPaths
                    .map(function (p) {
                      return (
                        "<li><span class='tm-shield-path'>" +
                        tmEsc(p.path) +
                        "</span> — " +
                        tmEsc(p.count) +
                        " hits</li>"
                      );
                    })
                    .join("") +
                  "</ul></div>"
                : "");
          })
          .catch(function (err) {
            host.innerHTML =
              "<h1 class='page-title'>Bouclier anti-attaque</h1><p class='dc-empty'>" +
              tmEsc((err && err.message) || "Impossible de charger le bouclier — redeployez l'API.") +
              "</p>";
          });
      }

      function tmHandleTab(view) {
        var mod = tmModule();
        if (mod && mod.handleTab) {
          return mod.handleTab(view);
        }
        tmShowView(view);
        var api = tmApi();
        if (!api) {
          tmToast("Scripts incomplets — Ctrl+Shift+R puis redeploy frontend.");
          return Promise.resolve();
        }
        var host;
        if (view === "board" || view === "review") {
          host = document.getElementById("tmTicketsList");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          var filter = view === "review" ? "review" : "all";
          return api.listTechManagerTickets(filter, 150)
            .then(function (data) {
              var tickets = (data && data.tickets) || [];
              if (!host) return;
              host.innerHTML = tickets.length
                ? tickets
                    .map(function (t) {
                      return (
                        "<article class='dc-ticket'><code>" +
                        (t.ticketNumber || "") +
                        "</code> <strong>" +
                        (t.title || "") +
                        "</strong></article>"
                      );
                    })
                    .join("")
                : "<p class='dc-empty'>Aucun ticket.</p>";
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "team" && api.listTechManagerTeam) {
          host = document.getElementById("tmTeamPanel");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          return api.listTechManagerTeam()
            .then(function (data) {
              var devs = (data && data.developers) || [];
              if (!host) return;
              host.innerHTML =
                "<h1 class='page-title'>Performances équipe</h1>" +
                (devs.length
                  ? devs
                      .map(function (d) {
                        return "<article class='dc-project-card'><h3>" + (d.displayName || "") + "</h3></article>";
                      })
                      .join("")
                  : "<p class='dc-empty'>Aucun développeur.</p>");
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "stats" && api.getTechManagerStats) {
          host = document.getElementById("tmStatsPanel");
          if (host) host.innerHTML = "<p class='dc-empty'>Chargement…</p>";
          return api.getTechManagerStats()
            .then(function (data) {
              var g = (data && data.global) || {};
              if (!host) return;
              host.innerHTML =
                "<h1 class='page-title'>Statistiques</h1><p>Total : " + (g.total || 0) + "</p>";
            })
            .catch(function (err) {
              if (host) {
                host.innerHTML =
                  "<p class='dc-empty'>" + ((err && err.message) || "Erreur API") + "</p>";
              }
            });
        }
        if (view === "shield") {
          return tmRenderShieldFallback();
        }
        return Promise.resolve();
      }

      function tmBindUi() {
        var nav = document.querySelector(".dc-nav");
        if (nav && !nav.dataset.tmBound) {
          nav.dataset.tmBound = "1";
          nav.addEventListener("click", function (e) {
            var tab = tmFindTab(e.target, nav);
            if (!tab) return;
            e.preventDefault();
            tmHandleTab(tab.getAttribute("data-view") || "board");
          });
        }
        var refreshBtn = document.getElementById("tmRefreshBtn");
        if (refreshBtn && !refreshBtn.dataset.tmBound) {
          refreshBtn.dataset.tmBound = "1";
          refreshBtn.addEventListener("click", function () {
            var mod = tmModule();
            if (mod && mod.refresh) {
              mod.refresh().catch(function (err) {
                tmToast((err && err.message) || "Erreur actualisation.");
              });
            } else {
              window.location.reload();
            }
          });
        }
        var logoutBtn = document.getElementById("btnLogout");
        if (logoutBtn && !logoutBtn.dataset.tmBound) {
          logoutBtn.dataset.tmBound = "1";
          logoutBtn.addEventListener("click", function () {
            if (typeof SAC_SESSION !== "undefined" && SAC_SESSION.logout) {
              var url =
                typeof SAC_PORTAL !== "undefined"
                  ? SAC_PORTAL.siteUrl("techmanager/")
                  : "techmanager/";
              SAC_SESSION.logout(url);
            } else {
              window.location.href = "techmanager/";
            }
          });
        }
      }

      function tmBoot() {
        tmBindUi();
        var mod = tmModule();
        if (mod && mod.init) {
          mod.init();
        } else if (tmApi()) {
          tmToast("Mode secours actif — Ctrl+Shift+R si l'onglet Bouclier est incomplet.");
          tmHandleTab("board");
        } else {
          tmToast("Chargement incomplet — Ctrl+Shift+R");
        }
      }

      document.addEventListener("DOMContentLoaded", tmBoot);
    })();
  </script>
</body>
</html>
