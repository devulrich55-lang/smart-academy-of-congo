<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>EvoBooks — Espace auteur</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-portal.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="icon" href="evo-uni.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/evodigitalbooks.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <meta name="theme-color" content="#1e1b4b" />
</head>
<body class="edb-dash-page" data-ws-role="auteur">
  <div id="edbAuthorRoot" class="edb-dash-root">
    <p class="edb-loading">Chargement de votre espace auteur…</p>
  </div>

  <script src="js/sac-identity.js"></script>
  <script src="js/sac-session.js"></script>
  <script src="js/sac-api.js"></script>
  <script src="js/sac-library.js"></script>
  <script src="js/sac-evodigitalbooks.js"></script>
  <script>
    (async function () {
      const session = await SAC_SESSION.guard("auteur");
      if (!session) return;
      if (typeof SAC_API !== "undefined" && SAC_API.ensureWritableApiSession) {
        await SAC_API.ensureWritableApiSession({ soft: true });
      }
      await SAC_EDB.mountAuthorPublisher(session, "edbAuthorRoot");
    })();
  </script>
  <script src="js/sac-mobile.js" defer></script>
</body>
</html>
