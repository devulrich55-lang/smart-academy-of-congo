<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>EvoDigitalBooks — Espace auteur</title>
  <script src="js/sac-config.js"></script>
  <script src="js/sac-portal.js"></script>
  <script src="js/sac-theme.js"></script>
  <link rel="icon" href="evo-uni.jpeg" type="image/jpeg" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/admin-workspace.css" />
  <link rel="stylesheet" href="css/evodigitalbooks.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <meta name="theme-color" content="#7c3aed" />
  <style>
    :root { --edb-accent: #7c3aed; --uni: #7c3aed; }
    .edb-dash-header { display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;padding:1rem 1.25rem;background:linear-gradient(135deg,#1a0f2e,#5b21b6);color:#fff; }
    .edb-dash-header a { color:#e9d5ff; }
  </style>
</head>
<body data-ws-role="auteur">
  <header class="edb-dash-header">
    <div>
      <strong style="font-size:1.15rem;">📖 EvoDigitalBooks</strong>
      <span id="edbAuthorName" style="display:block;font-size:0.88rem;opacity:0.9;margin-top:0.2rem;">—</span>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <a href="evodigitalbooks.html" class="btn btn--ghost btn--sm" style="color:#fff;">Catalogue public</a>
      <a href="plateforme.html" class="btn btn--ghost btn--sm" style="color:#fff;">Bibliothèque</a>
      <button type="button" class="btn btn--ghost btn--sm" id="btnLogout" style="color:#fff;">Déconnexion</button>
    </div>
  </header>

  <main class="layout" style="max-width:960px;margin:1.5rem auto;padding:0 1rem;">
    <div id="edbAuthorRoot"></div>
  </main>

  <script src="js/sac-identity.js"></script>
  <script src="js/sac-session.js"></script>
  <script src="js/sac-api.js"></script>
  <script src="js/sac-library.js"></script>
  <script src="js/sac-evodigitalbooks.js"></script>
  <script>
    (async function () {
      let session = await SAC_SESSION.guard("auteur");
      if (!session) return;

      const author = SAC_EDB.isAuthorApproved(session);
      document.getElementById("edbAuthorName").textContent =
        (session.displayName || session.identifiant) +
        (author ? " · Compte validé" : " · En attente de validation");

      if (typeof SAC_API !== "undefined" && SAC_API.ensureWritableApiSession) {
        await SAC_API.ensureWritableApiSession({ soft: true });
      }

      SAC_EDB.mountAuthorPublisher(session, "edbAuthorRoot");

      document.getElementById("btnLogout").addEventListener("click", () => {
        SAC_SESSION.logout("evodigitalbooks/");
      });
    })();
  </script>
  <script src="js/sac-mobile.js" defer></script>
</body>
</html>
